version: "3.9"

services:
  gateway:
    build: ./gateway
    container_name: gateway
    ports:
      - "8004:8004"
    env_file:
      - .env
    networks:
      - dl_pipeline_net

  preprocessing_service:
    build: ./preprocessing_service
    container_name: preprocessing_service
    volumes: -dl_pipeline_vol:/datasets
    env_file:
      - .env
    networks:
      - dl_pipeline_net

  training_service:
    build: ./trainging_service
    container_name: trainging_service
    volumes: -dl_pipeline_vol:/datasets
    env_file:
      - .env
    networks:
      - dl_pipeline_net

  inference_service:
    build: ./prediction_service
    container_name: prediction_service
    volumes: -dl_pipeline_vol:/datasets
    env_file:
      - .env
    networks:
      - dl_pipeline_net

  visualization_service:
    build: ./visualization_service
    container_name: visualization_service
    volumes: -dl_pipeline_vol:/datasets
    ports:
      - "8008:8008"
    env_file:
      - .env
    networks:
      - dl_pipeline_net

volumes:
  dl_pipeline_vol:

networks:
  dl_pipeline_net:
